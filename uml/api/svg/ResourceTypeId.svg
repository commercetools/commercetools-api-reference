@startuml
!pragma layout elk
hide methods
enum ResourceTypeId {
    ADDRESS
    ASSET
    APPROVAL_FLOW
    APPROVAL_RULE
    ASSOCIATE_ROLE
    BUSINESS_UNIT
    CART_DISCOUNT
    CATEGORY
    CHANNEL
    CUSTOMER
    CUSTOMER_GROUP
    CUSTOM_LINE_ITEM
    DISCOUNT_CODE
    INVENTORY_ENTRY
    LINE_ITEM
    ORDER
    ORDER_EDIT
    ORDER_DELIVERY
    ORDER_PARCEL
    ORDER_RETURN_ITEM
    PAYMENT
    PAYMENT_INTERFACE_INTERACTION
    PAYMENT_METHOD
    PAYMENT_METHOD_INFO
    PRODUCT_PRICE
    PRODUCT_SELECTION
    PRODUCT_TAILORING
    QUOTE
    RESERVATION
    REVIEW
    RECURRING_ORDER
    SHIPPING
    SHIPPING_METHOD
    SHOPPING_LIST
    SHOPPING_LIST_TEXT_LINE_ITEM
    STANDALONE_PRICE
    STORE
    TRANSACTION
}
interface Type [[Type.svg]]  {
    id: String
    version: Long
    createdAt: DateTime
    lastModifiedAt: DateTime
    lastModifiedBy: [[LastModifiedBy.svg LastModifiedBy]]
    createdBy: [[CreatedBy.svg CreatedBy]]
    key: String
    name: [[LocalizedString.svg LocalizedString]]
    description: [[LocalizedString.svg LocalizedString]]
    resourceTypeIds: [[ResourceTypeId.svg List<ResourceTypeId>]]
    fieldDefinitions: [[FieldDefinition.svg List<FieldDefinition>]]
}
interface TypeDraft [[TypeDraft.svg]]  {
    key: String
    name: [[LocalizedString.svg LocalizedString]]
    description: [[LocalizedString.svg LocalizedString]]
    resourceTypeIds: [[ResourceTypeId.svg List<ResourceTypeId>]]
    fieldDefinitions: [[FieldDefinition.svg List<FieldDefinition>]]
}
ResourceTypeId - -> Type #green;text:green : "resourceTypeIds"
ResourceTypeId - -> TypeDraft #green;text:green : "resourceTypeIds"
@enduml

