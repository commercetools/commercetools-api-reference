@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface Extension [[Extension.svg]] extends BaseResource {
    id: String
    version: Long
    createdAt: DateTime
    lastModifiedAt: DateTime
    lastModifiedBy: [[LastModifiedBy.svg LastModifiedBy]]
    createdBy: [[CreatedBy.svg CreatedBy]]
    key: String
    destination: [[ExtensionDestination.svg ExtensionDestination]]
    triggers: [[ExtensionTrigger.svg List<ExtensionTrigger>]]
    timeoutInMs: Integer
    dependencies: [[ExtensionReference.svg List<ExtensionReference>]]
    expansionPaths: [[String.svg List<String>]]
    additionalContext: [[ExtensionAdditionalContext.svg ExtensionAdditionalContext]]
}
interface BaseResource [[BaseResource.svg]]  {
    id: String
    version: Long
    createdAt: DateTime
    lastModifiedAt: DateTime
}


interface ExtensionPagedQueryResponse [[ExtensionPagedQueryResponse.svg]]  {
    limit: Long
    offset: Long
    count: Long
    total: Long
    results: [[Extension.svg List<Extension>]]
}
interface ExtensionReference [[ExtensionReference.svg]]  {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
    obj: [[Extension.svg Extension]]
}

Extension - -> ExtensionPagedQueryResponse #green;text:green : "results"
Extension - -> ExtensionReference #green;text:green : "obj"
@enduml

