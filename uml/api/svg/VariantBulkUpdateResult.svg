@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface VariantBulkUpdateResult [[VariantBulkUpdateResult.svg]]  {
    id: String
    key: String
    status: String
}


interface VariantBulkUpdateFailResult [[VariantBulkUpdateFailResult.svg]]  {
    id: String
    key: String
    status: String
    errors: [[ErrorObject.svg List<ErrorObject>]]
}
interface VariantBulkUpdateSuccessResult [[VariantBulkUpdateSuccessResult.svg]]  {
    id: String
    key: String
    status: String
    resource: [[VariantBulkUpdateResource.svg VariantBulkUpdateResource]]
}
interface VariantBulkUpdateResponse [[VariantBulkUpdateResponse.svg]]  {
    successCount: Integer
    failureCount: Integer
    results: [[VariantBulkUpdateResult.svg List<VariantBulkUpdateResult>]]
}
VariantBulkUpdateResult - -> VariantBulkUpdateFailResult #blue;text:blue : "status : Fail"
VariantBulkUpdateResult - -> VariantBulkUpdateSuccessResult #blue;text:blue : "status : Success"
VariantBulkUpdateResult - -> VariantBulkUpdateResponse #green;text:green : "results"
@enduml

