@startuml
!pragma layout elk
hide methods
enum ProductSearchStatus {
    ACTIVATED
    DEACTIVATED
}
interface ProjectChangeProductSearchStatusAction [[ProjectChangeProductSearchStatusAction.svg]]  {
    action: String
    status: [[ProductSearchStatus.svg ProductSearchStatus]]
}
ProductSearchStatus - -> ProjectChangeProductSearchStatusAction #green;text:green : "status"
@enduml

