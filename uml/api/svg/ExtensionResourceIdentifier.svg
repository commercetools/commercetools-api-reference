@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface ExtensionResourceIdentifier [[ExtensionResourceIdentifier.svg]] extends ResourceIdentifier {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
    key: String
}
interface ResourceIdentifier [[ResourceIdentifier.svg]]  {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
    key: String
}


interface ExtensionDraft [[ExtensionDraft.svg]]  {
    key: String
    destination: [[ExtensionDestination.svg ExtensionDestination]]
    triggers: [[ExtensionTrigger.svg List<ExtensionTrigger>]]
    timeoutInMs: Integer
    dependencies: [[ExtensionResourceIdentifier.svg List<ExtensionResourceIdentifier>]]
    expansionPaths: [[String.svg List<String>]]
    additionalContext: [[ExtensionAdditionalContextDraft.svg ExtensionAdditionalContextDraft]]
}
interface ExtensionSetDependenciesAction [[ExtensionSetDependenciesAction.svg]]  {
    action: String
    dependencies: [[ExtensionResourceIdentifier.svg List<ExtensionResourceIdentifier>]]
}

ExtensionResourceIdentifier - -> ExtensionDraft #green;text:green : "dependencies"
ExtensionResourceIdentifier - -> ExtensionSetDependenciesAction #green;text:green : "dependencies"
@enduml

