@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface ExtensionReference [[ExtensionReference.svg]] extends Reference {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
    obj: [[Extension.svg Extension]]
}
interface Reference [[Reference.svg]]  {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
}


interface Extension [[Extension.svg]]  {
    id: String
    version: Long
    createdAt: DateTime
    lastModifiedAt: DateTime
    lastModifiedBy: [[LastModifiedBy.svg LastModifiedBy]]
    createdBy: [[CreatedBy.svg CreatedBy]]
    key: String
    destination: [[ExtensionDestination.svg ExtensionDestination]]
    triggers: [[ExtensionTrigger.svg List<ExtensionTrigger>]]
    timeoutInMs: Integer
    dependencies: [[ExtensionReference.svg List<ExtensionReference>]]
    expansionPaths: [[String.svg List<String>]]
    additionalContext: [[ExtensionAdditionalContext.svg ExtensionAdditionalContext]]
}

ExtensionReference - -> Extension #green;text:green : "dependencies"
@enduml

