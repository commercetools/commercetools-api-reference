@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface VariantReference [[VariantReference.svg]] extends Reference {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
    obj: [[Variant.svg Variant]]
}
interface Reference [[Reference.svg]]  {
    typeId: [[ReferenceTypeId.svg ReferenceTypeId]]
    id: String
}


interface ProductData [[ProductData.svg]]  {
    name: [[LocalizedString.svg LocalizedString]]
    categories: [[CategoryReference.svg List<CategoryReference>]]
    categoryOrderHints: [[CategoryOrderHints.svg CategoryOrderHints]]
    description: [[LocalizedString.svg LocalizedString]]
    slug: [[LocalizedString.svg LocalizedString]]
    metaTitle: [[LocalizedString.svg LocalizedString]]
    metaDescription: [[LocalizedString.svg LocalizedString]]
    metaKeywords: [[LocalizedString.svg LocalizedString]]
    masterVariant: [[ProductVariant.svg ProductVariant]]
    variants: [[ProductVariant.svg List<ProductVariant>]]
    searchKeywords: [[SearchKeywords.svg SearchKeywords]]
    attributes: [[Attribute.svg List<Attribute>]]
    defaultVariant: [[VariantReference.svg VariantReference]]
}

VariantReference - -> ProductData #green;text:green : "defaultVariant"
@enduml

