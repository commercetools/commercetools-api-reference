@startuml
!pragma layout elk
hide empty fields
hide empty methods
legend
|= |= line |
|<back:black>   </back>| inheritance |
|<back:green>   </back>| property reference |
|<back:blue>   </back>| discriminated class |
endlegend
interface VariantProjection [[VariantProjection.svg]]  {
    id: String
    version: Long
    createdAt: DateTime
    staged: Boolean
    variantId: Integer
    product: [[ProductReference.svg ProductReference]]
    name: [[LocalizedString.svg LocalizedString]]
    slug: [[LocalizedString.svg LocalizedString]]
    description: [[LocalizedString.svg LocalizedString]]
    key: String
    sku: String
    images: [[Image.svg List<Image>]]
    assets: [[Asset.svg List<Asset>]]
    attributes: [[Attribute.svg List<Attribute>]]
    price: [[Price.svg Price]]
    default: Boolean
}



interface VariantProjectionPagedQueryResponse [[VariantProjectionPagedQueryResponse.svg]]  {
    limit: Long
    count: Long
    total: Long
    offset: Long
    results: [[VariantProjection.svg List<VariantProjection>]]
}

VariantProjection - -> VariantProjectionPagedQueryResponse #green;text:green : "results"
@enduml

